name: Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Update version
        run: |
          BASE="0.5"
          PATCH=${{ github.run_number }}
          VERSION="${BASE}.${PATCH}"
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" src/manifest.json
          echo "version=${VERSION}" >> $GITHUB_ENV

      - run: npm run build

      - name: Package ZIP
        run: cd dist && zip -r ../side-meow.zip .

      - name: Changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" -20)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          fi
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.version }}
          name: v${{ env.version }}
          body: |
            ## 变更内容
            ${{ steps.changelog.outputs.log }}
          files: side-meow.zip
